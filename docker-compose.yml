services:
  convex:
    image: ghcr.io/get-convex/convex-backend:latest
    container_name: rancang-convex-dev
    env_file:
      - .env.convex
    ports:
      - "3230:3210"   # Backend API
      - "3211:3211"   # Site (auth callbacks) — host port must match container port so OIDC discovery URL resolves both from browser and inside the container
    volumes:
      - rancang-convex-data:/convex/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CONVEX_CLOUD_ORIGIN=http://localhost:3230
      - CONVEX_SITE_ORIGIN=http://localhost:3211
      - DO_NOT_REQUIRE_SSL=true

  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    container_name: rancang-convex-dashboard
    ports:
      - "6793:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://localhost:3230
      - NEXT_PUBLIC_LOAD_MONACO_INTERNALLY=true
    depends_on:
      - convex

volumes:
  rancang-convex-data:
    name: rancang-convex-data
